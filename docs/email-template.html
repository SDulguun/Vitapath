<!--
  VitaPath — Supabase Magic Link email template (reference copy).

  This file is NOT served by the Next.js app. It exists so a grader / future
  maintainer can see the intended branded email without logging into the
  Supabase dashboard.

  How to apply (v2 brief §2.9):
    1. Supabase Dashboard → Authentication → Email Templates → Magic Link.
    2. Paste the markup below into the body editor.
    3. Repeat for "Confirm signup" if your project uses it.
    4. Save in the dashboard. The template variable {{ .ConfirmationURL }}
       is substituted by Supabase at send time.

  Constraints honored:
    - Inline styles only. No <style> block, no web fonts. Outlook and many
      corporate clients strip both.
    - Native font stacks; Georgia for headings is widely supported and
      reads close to Fraunces. Falls back to Times New Roman.
    - Tokens used are the same hex values as the redesigned web app's
      design tokens (see app/globals.css):
        bg            #F7F3EB
        surface       #FFFFFF
        surface-soft  #EEE8DC
        ink           #14201A
        ink-soft      #354539
        ink-muted     #677669
        sage          #5A8068
    - Mobile-first table layout. Width fixed at 480px to render reliably
      across desktop clients; on phones, the outer wrapper centers a card.

  Design decision (deviating slightly from brief): the brief asks for PNG
  icons hosted at /public/email/. We're shipping a text-only template
  first because (1) PNG dependencies break in stricter email clients
  (Outlook + corporate filters often strip remote images by default), and
  (2) the project doesn't yet have an exported logo PNG. The text-based
  brand mark in the header carries the same VitaPath identity. The icons
  can be reintroduced later by uploading them to /public/email/ and
  swapping the brand-mark <p> for an <img>.
-->

<table cellpadding="0" cellspacing="0" border="0" width="100%" style="background-color: #F7F3EB; padding: 32px 16px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;">
  <tr>
    <td align="center">
      <table cellpadding="0" cellspacing="0" border="0" width="480" style="max-width: 480px; width: 100%; background-color: #FFFFFF; border-radius: 16px; padding: 32px; box-shadow: 0 4px 12px rgba(20, 32, 26, 0.06);">
        <tr>
          <td>

            <!-- Brand mark -->
            <p style="margin: 0; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: #14201A; font-weight: 600;">
              VitaPath
            </p>

            <!-- Heading -->
            <h1 style="margin: 24px 0 0 0; font-family: Georgia, 'Times New Roman', serif; font-size: 24px; line-height: 1.25; color: #14201A; font-weight: 500;">
              Sign in to VitaPath
            </h1>

            <!-- Body -->
            <p style="margin: 16px 0 0 0; font-size: 16px; line-height: 1.6; color: #354539;">
              Click the button below to finish signing in. The link is good for 60 minutes.
            </p>

            <!-- CTA -->
            <p style="margin: 28px 0 0 0; text-align: center;">
              <a href="{{ .ConfirmationURL }}" style="display: inline-block; background-color: #5A8068; color: #FFFFFF; padding: 14px 28px; border-radius: 999px; text-decoration: none; font-weight: 600; font-size: 16px;">
                Sign in to VitaPath
              </a>
            </p>

            <!-- Plain URL fallback (helps clients that mangle the button) -->
            <p style="margin: 28px 0 0 0; font-size: 14px; line-height: 1.6; color: #677669;">
              Or paste this URL into your browser:
            </p>
            <p style="margin: 4px 0 0 0; font-family: ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace; font-size: 13px; line-height: 1.5; word-break: break-all; color: #677669;">
              {{ .ConfirmationURL }}
            </p>

            <!-- Divider -->
            <hr style="border: 0; border-top: 1px solid #EEE8DC; margin: 32px 0 0 0; height: 1px;">

            <!-- Footer -->
            <p style="margin: 16px 0 0 0; font-size: 13px; line-height: 1.6; color: #677669;">
              If you didn't request this, you can ignore this email. Your account stays untouched.
            </p>

          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>
